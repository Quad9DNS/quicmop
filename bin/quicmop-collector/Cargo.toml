[package]
name = "quicmop-collector"
authors.workspace = true
description.workspace = true
homepage.workspace = true
readme.workspace = true
license.workspace = true
version.workspace = true
edition.workspace = true
repository.workspace = true

[package.metadata.deb]
name = "quicmop-collector"
maintainer = "Ensar Sarajčić <dev@ensarsarajcic.com>"
assets = [
    { source = "target/release/quicmop-collector", dest = "usr/bin/", mode = "755" },
    { source = "../../distribution/collector-config.yaml", dest = "etc/quicmop/quicmop-collector.yaml", mode = "644" },
    { source = "../../README.md", dest = "usr/share/doc/quicmop-collector/README", mode = "644" },
    { source = "../../LICENSE", dest = "usr/share/licenses/quicmop-collector/LICENSE", mode = "644" },
]

[package.metadata.deb.variants.default]
depends = []
default-features = true

[package.metadata.deb.systemd-units]
unit-scripts = "../../distribution/systemd/"
unit-name = "quicmop-collector"
enable = false
start = false

[package.metadata.generate-rpm]
name = "quicmop-collector"
maintainer = "Ensar Sarajčić <dev@ensarsarajcic.com>"
assets = [
    { source = "target/release/quicmop-collector", dest = "/usr/bin/quicmop-collector", mode = "755" },
    { source = "../../distribution/collector-config.yaml", dest = "etc/quicmop/quicmop-collector.yaml", mode = "644" },
    { source = "../../README.md", dest = "/usr/share/doc/quicmop-collector/README", mode = "644", doc = true },
    { source = "../../LICENSE", dest = "/usr/share/licenses/quicmop-collector/LICENSE", mode = "644" },
    { source = "../../distribution/systemd/quicmop-collector.service", dest = "/lib/systemd/system/quicmop-collector.service", mode = "644" },
]

[package.metadata.generate-rpm.variants.default]
requires = {}
default-features = true

[features]
default = []

[dependencies]
async-stream.workspace = true
clap = { workspace = true, features = ["cargo", "derive", "string"] }
exitcode.workspace = true
futures.workspace = true
ipnet.workspace = true
metrics-exporter-prometheus.workspace = true
metrics-util.workspace = true
metrics.workspace = true
moka = { workspace = true, features = ["future"] }
netobserv-flow-proto.workspace = true
quicmop-metrics-exporters.workspace = true
quicmop-metrics.workspace = true
quicmop-proto.workspace = true
quicmop-signals.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
serde_yaml.workspace = true
snafu.workspace = true
sysinfo.workspace = true
tokio = { workspace = true, features = ["full"] }
tokio-stream = { workspace = true, features = ["io-util", "sync"] }
tonic.workspace = true
tracing-subscriber.workspace = true
tracing.workspace = true

[dev-dependencies]
criterion.workspace = true

[lib]
bench = false

[[bin]]
name = "quicmop-collector"
path = "src/main.rs"
bench = false
